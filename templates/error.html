<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error — FraudShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card text-center">
        <div style="width:60px;height:60px;background:#fde8e8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
            <i class="ti ti-alert-triangle" style="font-size:28px;color:#c0392b;"></i>
        </div>
        <h4 class="fw-bold mb-2">Something went wrong</h4>
        <div class="alert alert-danger text-start mt-3" style="font-size:12px;">
            <code>{{ error }}</code>
        </div>
        <a href="/" class="btn btn-primary w-100 mt-2">
            <i class="ti ti-arrow-left" style="font-size:14px;margin-right:5px;"></i>
            Back to dashboard
        </a>
    </div>
</div>
</body>
</html>
